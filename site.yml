- name: Deploy database
  hosts: all
  become: yes
  roles:
    - role_db

- name: Configure web servers (Nginx)
  hosts: webservers
  become: yes
  roles:
    - role_web

- name: Deploy Flask application
  hosts: all
  become: yes
  tasks:
    - name: Apply role_app to webservers and databases
      include_role:
        name: role_app
      when: inventory_hostname in groups['webservers'] or inventory_hostname in groups['databases']
